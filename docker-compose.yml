services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: kappa
      POSTGRES_PASSWORD: kappa
      POSTGRES_DB: kappa_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kappa -d kappa_db"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://kappa:kappa@db:5432/kappa_db
      SECRET_KEY: change-me-in-production
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
